<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 网络小说流行趋势分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f5f5f5; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-book"></i> 网络小说流行趋势分析系统</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">首页</a>
                <a class="nav-link" href="/analysis">分析</a>
                <a class="nav-link active" href="/admin">管理</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h4 class="mb-4"><i class="bi bi-gear"></i> 后台管理</h4>

        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <h6 class="text-muted">原始数据</h6>
                        <h2 id="rawCount">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <h6 class="text-muted">清洗后数据</h6>
                        <h2 id="cleanedCount">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <h6 class="text-muted">采集批次</h6>
                        <h2 id="batchCount">-</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header"><i class="bi bi-cloud-download"></i> 数据采集</div>
            <div class="card-body">
                <form id="crawlForm" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">采集页数</label>
                        <input type="number" class="form-control" id="crawlPages" value="5" min="1" max="20">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">分类</label>
                        <select class="form-select" id="crawlCategory">
                            <option value="xuanhuan">玄幻</option>
                            <option value="dushi">都市</option>
                            <option value="xianxia">仙侠</option>
                            <option value="lishi">历史</option>
                            <option value="junshi">军事</option>
                            <option value="youxi">游戏</option>
                            <option value="kehuan">科幻</option>
                            <option value="xuanyi">悬疑</option>
                            <option value="qingxiaoshuo">轻小说</option>
                        </select>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-play"></i> 开始采集</button>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button id="crawlAllBtn" class="btn btn-secondary w-100" title="对全部分类执行采集">全部采集</button>
                    </div>
                </form>
                <div id="crawlResult" class="mt-3"></div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header"><i class="bi bi-tools"></i> 数据处理</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <button class="btn btn-success w-100" onclick="runClean()">
                            <i class="bi bi-clean"></i> 数据清洗
                        </button>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-warning w-100" onclick="runKeywords()">
                            <i class="bi bi-tags"></i> 关键词提取
                        </button>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-info w-100" onclick="runTrends()">
                            <i class="bi bi-graph-up"></i> 趋势统计
                        </button>
                    </div>
                </div>
                <div id="processResult" class="mt-3"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><i class="bi bi-journal-text"></i> 采集批次</div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>批次号</th>
                                <th>采集时间</th>
                                <th>记录数</th>
                            </tr>
                        </thead>
                        <tbody id="batchTableBody">
                            <tr><td colspan="3" class="text-center">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
        function loadStats() {
            fetch('/api/admin/stats/raw')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('rawCount').textContent = data.data.total || 0;
                    }
                });

            fetch('/api/admin/stats/cleaned')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('cleanedCount').textContent = data.data.total || 0;
                    }
                });

            fetch('/api/admin/batches')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('batchCount').textContent = data.data.total || 0;
                        renderBatches(data.data.batches || []);
                    }
                });
        }

        function renderBatches(batches) {
            const tbody = document.getElementById('batchTableBody');
            if (!batches.length) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = batches.map(b => `
                <tr>
                    <td>${b.batch_no}</td>
                    <td>${b.crawl_time || '-'}</td>
                    <td>${b.count}</td>
                </tr>
            `).join('');
        }

        // existing per-category crawl handler
        document.getElementById('crawlForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pages = document.getElementById('crawlPages').value;
            const category = document.getElementById('crawlCategory').value;

            const btn = this.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 采集中...';

            fetch('/api/process/crawl', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({pages: parseInt(pages), category})
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('crawlResult').innerHTML = `
                    <div class="alert ${data.success ? 'alert-success' : 'alert-danger'}">
                        ${data.message}: 保存 ${data.data?.saved || 0} 条
                    </div>
                `;
                loadStats();
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-play"></i> 开始采集';
            });
        });

        // new: crawl all categories
        document.getElementById('crawlAllBtn').addEventListener('click', function() {
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 全部采集中...';
            fetch('/api/process/crawl-all', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({pages: 5})
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('crawlResult').innerHTML = `
                    <div class="alert ${data.success ? 'alert-success' : 'alert-danger'}">
                        ${data.message || 'All categories crawl completed'}
                    </div>
                `;
                loadStats();
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = '全部采集';
            });
        });

        function runClean() {
            postProcess('/api/process/clean', '数据清洗中...');
        }

        function runKeywords() {
            postProcess('/api/process/keywords', '关键词提取中...');
        }

        function runTrends() {
            postProcess('/api/process/trends', '趋势统计中...');
        }

        function postProcess(url, loadingMsg) {
            const resultDiv = document.getElementById('processResult');
            resultDiv.innerHTML = `<div class="alert alert-info">${loadingMsg}</div>`;

            fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({})
            })
            .then(res => res.json())
            .then(data => {
                resultDiv.innerHTML = `
                    <div class="alert ${data.success ? 'alert-success' : 'alert-danger'}">
                        ${data.message}
                    </div>
                `;
                loadStats();
            });
        }

        loadStats();
    </script>
</body>
</html>
